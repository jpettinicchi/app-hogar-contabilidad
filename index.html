<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contabilidad del Hogar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-darkBg text-slate-100 min-h-screen font-sans antialiased">

    <div id="modal-conexion" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="bg-darkCard p-6 rounded-2xl max-w-md w-full border border-slate-700 shadow-2xl">
            <div class="flex items-center gap-3 mb-4">
                <div class="p-3 bg-amber-500/10 text-amber-500 rounded-xl">
                    <i class="fa-solid fa-key text-xl"></i>
                </div>
                <div>
                    <h3 class="text-lg font-bold">Configurar conexión</h3>
                    <p class="text-xs text-slate-400">Se guarda de forma local en este dispositivo</p>
                </div>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold mb-1 text-slate-400">Supabase URL *</label>
                    <input type="text" id="setup-url" placeholder="https://xxxx.supabase.co" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 text-slate-200">
                </div>
                <div>
                    <label class="block text-xs font-semibold mb-1 text-slate-400">Anon Key / Clave Pública *</label>
                    <input type="password" id="setup-key" placeholder="eyJhbGciOi..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 text-slate-200">
                </div>
                <button onclick="guardarConfiguracionManual()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold text-sm transition-colors shadow-lg">
                    Conectar y guardar
                </button>
            </div>
        </div>
    </div>

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-40 px-4 py-3">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-start">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🏡</span>
                    <div>
                        <h1 class="text-lg font-bold tracking-tight">Contabilidad del Hogar</h1>
                        <div class="flex items-center gap-1.5 text-xs text-slate-400">
                            <span id="status-dot" class="w-2 h-2 rounded-full bg-gray-500"></span>
                            <span id="status-text">Detectando conexión...</span>
                        </div>
                    </div>
                </div>
                <button onclick="document.getElementById('modal-conexion').classList.remove('hidden')" class="p-2 bg-slate-800 hover:bg-slate-700 rounded-xl transition-colors text-slate-400">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
            
            <div class="flex items-center gap-2 w-full sm:w-auto bg-slate-800 p-1 rounded-xl border border-slate-700">
                <select id="filtro-temporal" onchange="cargarTodo()" class="bg-transparent text-sm font-semibold focus:outline-none pr-8 pl-2 py-1 cursor-pointer text-slate-200">
                    <option value="actual">📅 Mes Actual</option>
                    <option value="proyectado">🔮 Vista Proyecciones (12 Meses)</option>
                    <option value="anual">📊 Acumulado Anual</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 space-y-6">

        <section class="grid grid-cols-2 lg:grid-cols-5 gap-3 sm:gap-4">
            <div class="bg-darkCard p-4 rounded-2xl border border-slate-800">
                <p class="text-xs font-semibold text-slate-400 mb-1">Ingresos Totales</p>
                <h3 id="card-ingresos" class="text-xl sm:text-2xl font-black text-emerald-400">$0</h3>
            </div>
            <div class="bg-darkCard p-4 rounded-2xl border border-slate-800">
                <p class="text-xs font-semibold text-slate-400 mb-1">Gastos Totales</p>
                <h3 id="card-gastos" class="text-xl sm:text-2xl font-black text-rose-400">$0</h3>
            </div>
            <div class="bg-darkCard p-4 rounded-2xl border border-slate-800">
                <p class="text-xs font-semibold text-slate-400 mb-1">Ahorro Neto</p>
                <h3 id="card-ahorro" class="text-xl sm:text-2xl font-black text-blue-400">$0</h3>
                <p id="card-ahorro-pct" class="text-[10px] text-slate-400 mt-0.5">0% del ingreso</p>
            </div>
            <div class="bg-darkCard p-4 rounded-2xl border border-slate-800">
                <p class="text-xs font-semibold text-slate-400 mb-1">Salario Neto</p>
                <h3 id="card-salario-neto" class="text-xl sm:text-2xl font-black text-cyan-400">$0</h3>
            </div>
            <div class="bg-darkCard p-4 rounded-2xl border border-slate-800 col-span-2 lg:col-span-1">
                <p class="text-xs font-semibold text-slate-400 mb-1">⚠️ Gasto No Nec.</p>
                <h3 id="card-no-necesario" class="text-xl sm:text-2xl font-black text-amber-400">$0</h3>
            </div>
        </section>

        <div class="flex gap-2 border-b border-slate-800 pb-px overflow-x-auto no-scrollbar">
            <button onclick="switchTab('tab-dashboard')" id="btn
